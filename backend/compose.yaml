services:
  ceo-dashboard:
    build:
      context: ../frontend
    image: us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/ceo-dashboard
  mcp-gateway:
    image: docker/mcp-gateway:latest
    ports:
      - "8811:8811"
    command:
      - "--transport=sse"
      - "--servers=github-tool,web-scraper-tool,play-publisher-tool"
  discovery-cycle-service:
    build:
      context: . # Corrected context
      dockerfile: ./services/discovery_cycle/Dockerfile # Corrected path
    image: us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/discovery-cycle-service
    x-google-run-service:
      service-account: discovery-cycle-sa@app-factory-v2.iam.gserviceaccount.com
      ingress: internal-and-cloud-load-balancing
  cso-vetting-service:
    build:
      context: . # Corrected context
      dockerfile: ./services/cso_vetting/Dockerfile # Corrected path
    image: us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/cso-vetting-service
    x-google-run-service:
      service-account: cso-vetting-sa@app-factory-v2.iam.gserviceaccount.com
      ingress: internal-and-cloud-load-balancing
  cpo-analysis-service:
    build:
      context: . # Corrected context
      dockerfile: ./services/cpo_analysis/Dockerfile # Corrected path
    image: us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/cpo-analysis-service
    x-google-run-service:
      service-account: cpo-analysis-sa@app-factory-v2.iam.gserviceaccount.com
      ingress: internal-and-cloud-load-balancing
  ai-developer-agent-service:
    build:
      context: . # Corrected context
      dockerfile: ./services/ai_developer/Dockerfile # Corrected path
    image: us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/ai-developer-agent-service
    x-google-run-service:
      service-account: ai-developer-agent-sa@app-factory-v2.iam.gserviceaccount.com
      ingress: internal-and-cloud-load-balancing
    x-google-secrets:
      - secret: gemini-api-key
        env: GEMINI_API_KEY
  cmo-publishing-agent:
    build:
      context: . # Corrected context
      dockerfile: ./services/cmo_publishing/Dockerfile # Corrected path
    image: us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/cmo-publishing-agent
    x-google-run-service:
      service-account: cmo-publishing-agent-sa@app-factory-v2.iam.gserviceaccount.com
      ingress: internal-and-cloud-load-balancing
    x-google-secrets:
      - secret: google-play-api-key
        env: GOOGLE_PLAY_API_KEY
  github-tool:
    image: ghcr.io/github/github-mcp-server:latest
    x-google-secrets:
      - secret: github-token
        env: GITHUB_TOKEN
  web-scraper-tool:
    build:
      context: ./tools/robust_web_scraper
    image: us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/web-scraper-tool
    x-google-run-job:
      tasks: 1
      timeout: 3600s
  play-publisher-tool:
    build:
      context: ./tools/google_play_publisher
    image: us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/play-publisher-tool
    x-google-run-job:
      tasks: 1
      timeout: 3600s