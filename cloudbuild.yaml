steps:
  # Build and push all container images
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build and Push Images'
    args: ['compose', '-f', 'backend/compose.yaml', 'push']

  # Initialize Terraform in the 'terraform' subdirectory
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Init'
    entrypoint: 'terraform'
    args:
      - '-chdir=terraform'
      - 'init'
      - '-reconfigure'
      - '-backend-config=bucket=${_TERRAFORM_STATE_BUCKET}'
      - '-backend-config=prefix=terraform/state/${_ENV_SUFFIX}'
    waitFor: ['Build and Push Images']

  # Terraform Plan, referencing the correct var-file path from within the terraform directory
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Plan'
    entrypoint: 'terraform'
    args:
      - '-chdir=terraform'
      - 'plan'
      - '-out=tf.plan'
      - '-var-file=environments/${_ENV_SUFFIX}.tfvars'
    waitFor: ['Terraform Init']

  # Manual Approval Step for Production Environment
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Manual Approval'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [[ "${_ENV_SUFFIX}" == "prod" ]]; then
          echo "Production deployment requires manual approval."
        else
          echo "Skipping manual approval for non-prod environment."
        fi
    waitFor:
      - 'Terraform Plan'

  # Terraform Apply, referencing the plan file within the terraform directory
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Apply'
    entrypoint: 'terraform'
    args:
      - '-chdir=terraform'
      - 'apply'
      - '-auto-approve'
      - 'tf.plan'
    waitFor:
      - 'Manual Approval'

substitutions:
  _ENV_SUFFIX: 'dev'
  _TERRAFORM_STATE_BUCKET: 'app-factory-v2-tf-state'

options:
  logging: CLOUD_LOGGING_ONLY