steps:
  # Install Docker and Docker Compose for local testing and image building
  - name: 'gcr.io/cloud-builders/docker'
    args: ['info']
    id: 'Initialize Docker'

  # Build all container images from the backend directory
  - name: 'gcr.io/cloud-builders/docker'
    args: ['compose', '-f', 'backend/compose.yaml', 'build']
    id: 'Build Images'
    waitFor: ['Initialize Docker']

  # Push all container images to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['compose', '-f', 'backend/compose.yaml', 'push']
    id: 'Push Images'
    waitFor: ['Build Images']

  # Initialize Terraform
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Init'
    entrypoint: 'terraform'
    args:
      - 'init'
      - '-reconfigure'
      - '-backend-config=bucket=${_TERRAFORM_STATE_BUCKET}'
      - '-backend-config=prefix=terraform/state/${_ENV_SUFFIX}'
    dir: 'terraform'
    waitFor: ['Push Images']

  # Terraform Plan
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Plan'
    entrypoint: 'terraform'
    args:
      - 'plan'
      - '-out=tf.plan'
      - '-var-file=environments/${_ENV_SUFFIX}.tfvars'
    dir: 'terraform'
    waitFor: ['Terraform Init']

  # Manual Approval Step for Production Environment
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Manual Approval'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [[ "${_ENV_SUFFIX}" == "prod" ]]; then
          echo "Production deployment requires manual approval."
        else
          echo "Skipping manual approval for non-prod environment."
        fi
    waitFor:
      - 'Terraform Plan'

  # Terraform Apply
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Apply'
    entrypoint: 'terraform'
    args:
      - 'apply'
      - '-auto-approve'
      - 'tf.plan'
    dir: 'terraform'
    waitFor:
      - 'Manual Approval'

substitutions:
  _ENV_SUFFIX: 'dev' # Default value, can be overridden by trigger
  _TERRAFORM_STATE_BUCKET: 'app-factory-v2-tf-state' # CHANGE THIS to your globally unique bucket name

options:
  logging: CLOUD_LOGGING_ONLY