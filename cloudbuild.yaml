steps:
# Step 1: Build all container images.
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'backend/compose.yaml', 'build']

# Step 2: Push the images to Artifact Registry.
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'backend/compose.yaml', 'push']

# Step 3: Execute the deployment script, passing the substitution variable.
- name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli'
  entrypoint: 'bash'
  args: ['./deploy.sh', '${_ENV_SUFFIX}']

# Define the substitution variable with a default value.
substitutions:
  _ENV_SUFFIX: dev

options:
  logging: CLOUD_LOGGING_ONLY