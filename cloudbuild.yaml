steps:
  # Build and push all container images to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['compose', '-f', 'backend/compose.yaml', 'build']
    id: 'Build Images'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['compose', '-f', 'backend/compose.yaml', 'push']
    id: 'Push Images'
    waitFor: ['Build Images']

  # Setup Terraform with the correct workspace for the environment
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Workspace'
    dir: 'terraform'
    entrypoint: 'terraform'
    args:
      - 'workspace'
      - 'select'
      - '${_ENV_SUFFIX}'
    # This step is allowed to fail if the workspace doesn't exist yet
    allow_failure: true
    waitFor: ['Push Images']

  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Init'
    dir: 'terraform'
    entrypoint: 'bash'
    args:
      - -c
      - |
        # If workspace select failed, create the new workspace
        if [ $? -ne 0 ]; then
          terraform workspace new ${_ENV_SUFFIX}
        fi
        terraform init -reconfigure -backend-config=bucket=${_TERRAFORM_STATE_BUCKET}
    waitFor:
      - 'Terraform Workspace'

  # Generate a Terraform plan
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Plan'
    dir: 'terraform'
    entrypoint: 'terraform'
    args:
      - 'plan'
      - '-out=tf.plan'
      - '-var-file=environments/${_ENV_SUFFIX}.tfvars'
    waitFor:
      - 'Terraform Init'

  # Halt for a manual approval before deploying to production
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Manual Approval'
    # The 'waitFor: ["-"]' creates a step that must be manually approved in the UI
    waitFor: ['-']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [[ "${_ENV_SUFFIX}" != "prod" ]]; then
          echo "Skipping manual approval for non-prod environment."
        else
          echo "Production deployment requires manual approval in the Cloud Build UI."
        fi

  # Apply the Terraform plan
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Apply'
    dir: 'terraform'
    entrypoint: 'terraform'
    args:
      - 'apply'
      - '-auto-approve'
      - 'tf.plan'
    waitFor:
      - 'Terraform Plan'
      - [cite_start]'Manual Approval' # This makes the apply step wait for the approval [cite: 68]

substitutions:
  [cite_start]_ENV_SUFFIX: 'dev' # Default value; can be 'dev' or 'prod' [cite: 259]
  _TERRAFORM_STATE_BUCKET: 'app-factory-v2-tf-state' # CHANGE THIS to your chosen state bucket name

options:
  logging: CLOUD_LOGGING_ONLY