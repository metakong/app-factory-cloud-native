steps:
  # Build and push all container images to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Images'
    args: ['compose', '-f', 'backend/compose.yaml', 'build']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Images'
    args: ['compose', '-f', 'backend/compose.yaml', 'push']
    waitFor: ['Build Images']

  # Setup Terraform with the correct workspace for the environment
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Workspace'
    dir: 'terraform'
    entrypoint: 'terraform'
    args:
      - 'workspace'
      - 'select'
      - '${_ENV_SUFFIX}'
    allow_failure: true
    waitFor: ['Push Images']

  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Init'
    dir: 'terraform'
    entrypoint: 'sh' # CORRECTED: Use 'sh' instead of 'bash'
    args:
      - '-c'
      - |
        # If workspace select failed, create the new workspace
        if ! terraform workspace list | grep -q "${_ENV_SUFFIX}"; then
          terraform workspace new ${_ENV_SUFFIX}
        fi
        terraform init -reconfigure -backend-config=bucket=${_TERRAFORM_STATE_BUCKET}
    waitFor:
      - 'Terraform Workspace'

  # Generate a Terraform plan
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Plan'
    dir: 'terraform'
    entrypoint: 'terraform'
    args:
      - 'plan'
      - '-out=tf.plan'
      - '-var-file=environments/${_ENV_SUFFIX}.tfvars'
    waitFor:
      - 'Terraform Init'

  # Halt for a manual approval before deploying to production
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Manual Approval'
    waitFor: ['-']
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        if [ "${_ENV_SUFFIX}" = "prod" ]; then
          echo "Production deployment requires manual approval in the Cloud Build UI."
        else
          echo "Skipping manual approval for non-prod environment."
        fi

  # Apply the Terraform plan
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Apply'
    dir: 'terraform'
    entrypoint: 'terraform'
    args:
      - 'apply'
      - '-auto-approve'
      - 'tf.plan'
    waitFor:
      - 'Terraform Plan'
      - 'Manual Approval'

substitutions:
  _ENV_SUFFIX: 'dev'
  _TERRAFORM_STATE_BUCKET: 'app-factory-v2-tf-state'

options:
  logging: CLOUD_LOGGING_ONLY