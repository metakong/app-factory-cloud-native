steps:
# Step 1: Build all container images.
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'compose.yaml', 'build']
  dir: 'backend'

# Step 2: Push the images to Artifact Registry.
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'compose.yaml', 'push']
  dir: 'backend'

# Step 3: Deploy each service individually to Cloud Run.
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      gcloud run deploy cso-vetting-service --image=us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/cso-vetting-service --region=us-central1 --platform=managed --allow-unauthenticated && \
      gcloud run deploy ai-developer-agent-service --image=us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/ai-developer-agent-service --region=us-central1 --platform=managed --allow-unauthenticated && \
      gcloud run deploy web-scraper-tool --image=us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/web-scraper-tool --region=us-central1 --platform=managed --allow-unauthenticated && \
      gcloud run deploy cmo-publishing-agent --image=us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/cmo-publishing-agent --region=us-central1 --platform=managed --allow-unauthenticated && \
      gcloud run deploy cpo-analysis-service --image=us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/cpo-analysis-service --region=us-central1 --platform=managed --allow-unauthenticated && \
      gcloud run deploy discovery-cycle-service --image=us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/discovery-cycle-service --region=us-central1 --platform=managed --allow-unauthenticated && \
      gcloud run deploy play-publisher-tool --image=us-central1-docker.pkg.dev/app-factory-v2/app-factory-repo/play-publisher-tool --region=us-central1 --platform=managed --allow-unauthenticated
  dir: 'backend'

options:
  logging: CLOUD_LOGGING_ONLY