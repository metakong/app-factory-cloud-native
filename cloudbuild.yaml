steps:
  # 1. Build and push all container images to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build and Push Images'
    args: ['compose', '-f', 'backend/compose.yaml', 'build', '--push']

  # 2. Initialize Terraform and configure the workspace
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Init'
    dir: 'terraform'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        # Ensure we exit on any error
        set -e
        terraform init -reconfigure -backend-config=bucket=${_TERRAFORM_STATE_BUCKET}
        # Select workspace or create it if it doesn't exist
        if! terraform workspace list | grep -q "${_ENV_SUFFIX}"; then
          terraform workspace new "${_ENV_SUFFIX}"
        else
          terraform workspace select "${_ENV_SUFFIX}"
        fi
    waitFor:
      - 'Build and Push Images'

  # 3. Generate a Terraform plan
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Plan'
    dir: 'terraform'
    entrypoint: 'terraform'
    args:
      - 'plan'
      - '-out=tf.plan'
      - '-var-file=environments/${_ENV_SUFFIX}.tfvars'
    waitFor:
      - 'Terraform Init'

  # 4. Halt for a manual approval before deploying to production
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Manual Approval'
    waitFor:
      - 'Terraform Plan'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'echo "This step is reserved for manual approval in production triggers."'

  # 5. Apply the Terraform plan
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Apply'
    dir: 'terraform'
    entrypoint: 'terraform'
    args:
      - 'apply'
      - '-auto-approve'
      - 'tf.plan'
    waitFor:
      - 'Manual Approval'

substitutions:
  _ENV_SUFFIX: 'dev'
  _TERRAFORM_STATE_BUCKET: 'app-factory-v2-tf-state'

options:
  logging: CLOUD_LOGGING_ONLY