steps:
# Step 1: Build all container images locally in the build worker.
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'compose.yaml', 'build']
  dir: 'backend'

# Step 2: Push the built images to Artifact Registry.
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'compose.yaml', 'push']
  dir: 'backend'

# Step 3: Deploy the pre-built images from the registry to Cloud Run.
- name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli'
  entrypoint: 'gcloud'
  args:
    - 'alpha'
    - 'run'
    - 'compose'
    - 'up'
    - '--region=us-central1'
  dir: 'backend'

options:
  logging: CLOUD_LOGGING_ONLY