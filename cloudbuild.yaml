steps:
  # Step 0: Build all container images using Docker Compose
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Images'
    args: ['compose', '-f', 'backend/compose.yaml', 'build']

  # Step 1: Push the built images to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Images'
    args: ['compose', '-f', 'backend/compose.yaml', 'push']
    waitFor: ['Build Images']

  # Step 2: Initialize Terraform in the 'terraform' subdirectory
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Init'
    entrypoint: 'terraform'
    args:
      - '-chdir=terraform'
      - 'init'
      - '-reconfigure'
      - '-backend-config=bucket=${_TERRAFORM_STATE_BUCKET}'
      - '-backend-config=prefix=terraform/state/${_ENV_SUFFIX}'
    waitFor: ['Push Images']

  # Step 3: Terraform Plan
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Plan'
    entrypoint: 'terraform'
    args:
      - '-chdir=terraform'
      - 'plan'
      - '-out=tf.plan'
      - '-var-file=environments/${_ENV_SUFFIX}.tfvars'
    waitFor: ['Terraform Init']

  # Step 4: Manual Approval for Production Environment
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Manual Approval'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [[ "${_ENV_SUFFIX}" == "prod" ]]; then
          echo "Production deployment requires manual approval."
        else
          echo "Skipping manual approval for non-prod environment."
        fi
    waitFor:
      - 'Terraform Plan'

  # Step 5: Terraform Apply
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Apply'
    entrypoint: 'terraform'
    args:
      - '-chdir=terraform'
      - 'apply'
      - '-auto-approve'
      - 'tf.plan'
    waitFor:
      - 'Manual Approval'

substitutions:
  _ENV_SUFFIX: 'dev'
  _TERRAFORM_STATE_BUCKET: 'app-factory-v2-tf-state'

options:
  logging: CLOUD_LOGGING_ONLY