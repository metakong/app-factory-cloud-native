steps:
# Step 1: Build all container images using the standard compose file.
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'compose.yaml', 'build']
  dir: 'backend'

# Step 2: Push the images to Artifact Registry.
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'compose.yaml', 'push']
  dir: 'backend'

# Step 3: Create a deployment-specific compose file and deploy.
- name: 'google/cloud-sdk:latest'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Install the gcloud run-compose component
      apt-get update && apt-get install -y google-cloud-cli-run-compose
      
      # Create a new compose file for deployment that ONLY contains image directives.
      # This finds lines with 'build:' and deletes that line and the next two lines,
      # outputting the result to a new file.
      sed '/build:/,+2 d' compose.yaml > compose.deploy.yaml
      
      # Deploy using the new, deployment-specific compose file.
      gcloud alpha run compose up -f compose.deploy.yaml --region=us-central1
  dir: 'backend'

options:
  logging: CLOUD_LOGGING_ONLY