steps:
# Step 1: Build all container images locally in the build worker.
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'compose.yaml', 'build']
  dir: 'backend'

# Step 2: Push the explicitly named images to Artifact Registry.
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'compose.yaml', 'push']
  dir: 'backend'

# Step 3: Deploy the now-existing images from the registry to Cloud Run.
- name: 'google/cloud-sdk:latest'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      apt-get update && apt-get install -y google-cloud-cli-run-compose && \
      gcloud alpha run compose up --region=us-central1 --no-build
  dir: 'backend'

options:
  logging: CLOUD_LOGGING_ONLY