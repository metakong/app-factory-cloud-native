steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'compose.yaml', 'build']
  dir: 'backend'
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'compose.yaml', 'push']
  dir: 'backend'
- name: 'google/cloud-sdk:latest'
  entrypoint: 'gcloud'
  args:
    - 'alpha'
    - 'run'
    - 'compose'
    - 'up'
    - '--project=app-factory-v2'
    - '--region=us-central1'
  dir: 'backend'
options:
  logging: CLOUD_LOGGING_ONLY