steps:
# Step 1: Build all container images.
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'compose.yaml', 'build']
  dir: 'backend'

# Step 2: Push the images to Artifact Registry.
- name: 'gcr.io/cloud-builders/docker'
  args: ['compose', '-f', 'compose.yaml', 'push']
  dir: 'backend'

# Step 3: Install the component and deploy to Cloud Run in a single step.
- name: 'google/cloud-sdk:latest'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      apt-get update && apt-get install -y google-cloud-cli-run-compose && \
      gcloud alpha run compose up --region=us-central1
  dir: 'backend'

options:
  logging: CLOUD_LOGGING_ONLY