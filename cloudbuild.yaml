steps:
  # 1. Build and push all container images to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build and Push Images'
    args: ['compose', '-f', 'backend/compose.yaml', 'build', '--push']

  # 2. Prepare API Gateway spec
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Prepare API Spec'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        export _ENV_SUFFIX=${_ENV_SUFFIX}
        export PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
        envsubst < api-spec.template.yaml > terraform/api-spec.yaml
    waitFor:
      - 'Build and Push Images'

  # 3. Initialize Terraform
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Init'
    dir: 'terraform'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        set -e
        terraform init -reconfigure -backend-config=bucket=${_TERRAFORM_STATE_BUCKET}
        if ! terraform workspace list | grep -q "${_ENV_SUFFIX}"; then 
          terraform workspace new "${_ENV_SUFFIX}"
        else
          terraform workspace select "${_ENV_SUFFIX}"
        fi 
    waitFor:
      - 'Prepare API Spec'

  # 4. Generate a Terraform plan
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Plan'
    dir: 'terraform'
    entrypoint: 'terraform'
    args:
      - 'plan'
      - '-out=tf.plan'
      - '-var-file=environments/${_ENV_SUFFIX}.tfvars'
    waitFor:
      - 'Terraform Init'

  # 5. Manual approval for production
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Manual Approval'
    waitFor:
      - 'Terraform Plan'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'echo "This step is reserved for manual approval in production triggers."'

  # 6. Apply the Terraform plan
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Apply'
    dir: 'terraform'
    entrypoint: 'terraform'
    args:
      - 'apply'
      - '-auto-approve'
      - 'tf.plan'
    waitFor:
      - 'Manual Approval'

substitutions:
  _ENV_SUFFIX: 'dev'
  _TERRAFORM_STATE_BUCKET: 'app-factory-v2-tf-state'

options:
  logging: CLOUD_LOGGING_ONLY